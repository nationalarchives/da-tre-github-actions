# Action to get latest pushed image
name: 'Get latest deployed'
description: 'Gets the tag of the latest pushed image or 0.0 if no image or latest image not tagged'
inputs:
  ecr_registry_path:
    type: string
    required: true
  aws-role:
    required: true
    description: 'AWS role allowed to read ECR'
outputs:
  latest-version:
    description: latest version
    value: ${{ steps.latest.outputs.latest-version }}
runs:
  using: "composite"
  steps:
    - name: login
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
      with:
        role-to-assume: ${{ inputs.aws-role }}
        aws-region: eu-west-2
        role-session-name: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
    - name: Get latest image details
      id: latest-ecr-version-file
      shell: bash
      env:
        ECR_REGISTRY_PATH: ${{ inputs.ecr_registry_path }}
      run: |
        aws ecr describe-images --repository-name "${ECR_REGISTRY_PATH}" --filter tagStatus=TAGGED --query 'sort_by(imageDetails,& imagePushedAt)[-1]' > ecr_versions.json
        echo "latest-image<<EOF" >> $GITHUB_OUTPUT
        cat ecr_versions.json >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: get latest version
      id: latest
      shell: bash
      env:
        IMAGE_TAG_0: ${{ fromJson(steps.latest-ecr-version-file.outputs.latest-image).imageTags[0] }}
        IMAGE_TAG_1: ${{ fromJson(steps.latest-ecr-version-file.outputs.latest-image).imageTags[1] }}
      run: |
        if ! [ -f ecr_versions.json ]; then
          echo "latest-version=0.0" >> $GITHUB_OUTPUT
        fi
        if [ -f ecr_versions.json ]; then
           echo "latest-version=${IMAGE_TAG_0}" >> $GITHUB_OUTPUT
        fi
        if [ -f ecr_versions.json ] && [ -n "${IMAGE_TAG_1}" ] && [ "${IMAGE_TAG_0}" = "latest" ];  then
           echo "latest-version=${IMAGE_TAG_1}" >> $GITHUB_OUTPUT ;
        fi

# Action to build then push a given Docker image to ECR, creating the
# repository name in ECR first if it does not exist.
name: 'Docker build and deploy to ECR'
description: 'Push Docker image to ECR, creating repository if necessary'
inputs:
  dockerfile-dir:
    description: 'The directory containing the Docker file to build; e.g. "build-dir"'
    required: true
  docker-file:
    description: 'Optional path to Dockerfile'
    required: false
  image-name:
    description: 'The name of the Docker image to push; e.g. "some-image"'
    required: true
  image-version:
    description: 'The version of the Docker image to push; e.g. "1.2.3"'
    required: true
  ecr-registry-path:
    description: 'The path part of the repository name; i.e. the "alpha" in "alpha/docker-image-name"'
    required: true
  aws-region:
    description: 'AWS region'
    required: true
  pip-index-file:
    description: 'Optional file containing pip index url to be supplied as a docker build argument'
    required: false
  wiz-client-id:
    description: 'Wiz client ID'
    required: true
  wiz-client-secret:
    description: 'Wiz client secret'
    required: true
  wiz-project-tre:
    description: 'Wiz project TRE'
    required: true
runs:
  using: "composite"
  steps:
    - name: AWS ECR login
      id: aws-ecr-login
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076
    - name: Docker build and tag
      shell: bash
      env:
        REGISTRY: ${{ steps.aws-ecr-login.outputs.registry }}
        REGISTRY_PATH: ${{ inputs.ecr-registry-path }}
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_VERSION: ${{ inputs.image-version }}
        ECR_REPOSITORY_NAME: ${{ inputs.ecr-registry-path }}/${{ inputs.image-name }}
        PIP_INDEX_FILE: ${{ inputs.pip-index-file }}
        DOCKER_FILE: ${{ inputs.docker-file }}
        DOCKERFILE_DIR: ${{ inputs.dockerfile-dir }}
      run: |
        docker images
        build_arg=""
        if [ -n "${PIP_INDEX_FILE}" ]; then
          pip_index_file_contents=$(cat "${PIP_INDEX_FILE}")
          build_arg="--build-arg PIP_INDEX_URL=$pip_index_file_contents"
        fi

        if [ -n "${DOCKER_FILE}" ]; then
           build_arg+=" -f ${DOCKER_FILE}"
        fi
        docker buildx build \
        $build_arg \
        --output=type=docker \
        --provenance=false \
        --sbom=false \
        --tag "${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME}:${IMAGE_VERSION}" \
        "${DOCKERFILE_DIR}"
        docker images
    - name: Download Wiz CLI
      shell: bash
      run: |
        curl -Lo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
        curl -Lo /tmp/wizcli-sha256 https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64-sha256
        curl -Lo /tmp/wizcli-sha256.sig https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64-sha256.sig
        chmod +x wizcli
    - name: Verify Wiz CLI signature
      shell: bash
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
      run: |
        curl -Lo public_key.asc https://downloads.wiz.io/wizcli/public_key.asc
        gpg --import public_key.asc
        gpg --verify /tmp/wizcli-sha256.sig /tmp/wizcli-sha256
        echo "$(cat /tmp/wizcli-sha256) wizcli" | sha256sum --check
    - name: Run Wiz CLI directory scan
      shell: bash
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
        IMAGE_NAME: ${{ inputs.image-name }}
        RUN_NUMBER: ${{ github.run_number }}
        WIZ_PROJECT_TRE: ${{ inputs.wiz-project-tre }}
      run: >-
        ./wizcli scan dir .
        --name "${IMAGE_NAME}-${RUN_NUMBER}" --project "${WIZ_PROJECT_TRE}"
    - name: Wiz Container Image Scan
      shell: bash
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
        REGISTRY: ${{ steps.aws-ecr-login.outputs.registry }}
        REGISTRY_PATH: ${{ inputs.ecr-registry-path }}
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_VERSION: ${{ inputs.image-version }}
        WIZ_PROJECT_TRE: ${{ inputs.wiz-project-tre }}
      run: >-
        ./wizcli scan container-image "${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME}:${IMAGE_VERSION}"
        --project "${WIZ_PROJECT_TRE}"
    - name: 'AWS ECR docker push'
      shell: bash
      env:
        REGISTRY: ${{ steps.aws-ecr-login.outputs.registry }}
        REGISTRY_PATH: ${{ inputs.ecr-registry-path }}
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-version }}
        ECR_REPOSITORY_NAME: ${{ inputs.ecr-registry-path }}/${{ inputs.image-name }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        # Create ECR repository if it doesn't exist
        if [[ $(aws ecr describe-repositories \
          --region "${AWS_REGION}" \
          --repository-names "${ECR_REPOSITORY_NAME}" \
        ) ]]; then
          printf 'Repository "%s" already exists' "${ECR_REPOSITORY_NAME}"
        else
          printf 'Creating repository "%s"' "${ECR_REPOSITORY_NAME}"
          aws ecr create-repository \
            --region "${AWS_REGION}" \
            --repository-name "${ECR_REPOSITORY_NAME}" \
            --image-scanning-configuration \
            scanOnPush=true
        fi

        docker push "${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME}:${IMAGE_TAG}"
    - name: Wiz Docker Tag
      shell: bash
      env:
        WIZ_CLIENT_ID: ${{ inputs.wiz-client-id }}
        WIZ_CLIENT_SECRET: ${{ inputs.wiz-client-secret }}
        REGISTRY: ${{ steps.aws-ecr-login.outputs.registry }}
        REGISTRY_PATH: ${{ inputs.ecr-registry-path }}
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_VERSION: ${{ inputs.image-version }}
      run: |
        ./wizcli tag "${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME}:${IMAGE_VERSION}"

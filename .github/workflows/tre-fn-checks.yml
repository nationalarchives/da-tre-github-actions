name: on-push-checks
on:
  workflow_call:
    inputs:
      run_unit_tests:
        type: boolean
        required: true
      run_feature_tests:
        type: boolean
        required: true
      run_pre_commit:
        type: boolean
        required: true
      requirements_txt:
        type: string
        required: false
      pip-url-output-file:
        type: string
        description: 'Name of file to which pip access URL will be written'
        default: 'pip-url.txt'
        required: false
    secrets:
      AWS_OPEN_ID_CONNECT_ROLE_ARN:
        required: false
      AWS_CODEARTIFACT_REPOSITORY_NAME:
        required: false
      AWS_CODEARTIFACT_REPOSITORY_DOMAIN:
        required: false
      AWS_CODEARTIFACT_REPOSITORY_ACCOUNT:
        required: false
      AWS_REGION:
        required: false
permissions:
  id-token: write  # required by aws-actions/configure-aws-credentials
env:
  PYTHON_VERSION: '3.8'
jobs:
  check-unit-tests:
    if: inputs.run_unit_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: AWS credential setup
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_OPEN_ID_CONNECT_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          # triggering-actor could differ for re-runs: https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
          role-session-name: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Get AWS CodeArtifact pip URL
        uses: nationalarchives/da-tre-github-actions/.github/actions/get-aws-codeartifact-pip-url@110559c0bbef60ed4a81ff8f66f22f1bcef67fd6 # 0.0.82
        with:
          repository: ${{ secrets.AWS_CODEARTIFACT_REPOSITORY_NAME }}
          domain: ${{ secrets.AWS_CODEARTIFACT_REPOSITORY_DOMAIN }}
          domain-owner: ${{ secrets.AWS_CODEARTIFACT_REPOSITORY_ACCOUNT }}
          aws-region: ${{ secrets.AWS_REGION }}
          pip-url-output-file: ${{ inputs.pip-url-output-file }}
      - name: Run unit tests
        shell: bash
        env:
          PIP_URL_OUTPUT_FILE: ${{ inputs.pip-url-output-file }}
          REQUIREMENTS_TXT: ${{ inputs.requirements_txt }}
        run: |
          export PIP_INDEX_URL="$(cat "${PIP_URL_OUTPUT_FILE}")"
          pip install -r "${REQUIREMENTS_TXT}"
          cd tests/units
          python -m unittest discover
  check-feature-tests:
    if: inputs.run_feature_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: AWS credential setup
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_OPEN_ID_CONNECT_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          # triggering-actor could differ for re-runs: https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
          role-session-name: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Get AWS CodeArtifact pip URL
        uses: nationalarchives/da-tre-github-actions/.github/actions/get-aws-codeartifact-pip-url@110559c0bbef60ed4a81ff8f66f22f1bcef67fd6 # 0.0.82
        with:
          repository: ${{ secrets.AWS_CODEARTIFACT_REPOSITORY_NAME }}
          domain: ${{ secrets.AWS_CODEARTIFACT_REPOSITORY_DOMAIN }}
          domain-owner: ${{ secrets.AWS_CODEARTIFACT_REPOSITORY_ACCOUNT }}
          aws-region: ${{ secrets.AWS_REGION }}
          pip-url-output-file: ${{ inputs.pip-url-output-file }}
      - name: Run feature tests
        shell: bash
        env:
          PIP_URL_OUTPUT_FILE: ${{ inputs.pip-url-output-file }}
          REQUIREMENTS_TXT: ${{ inputs.requirements_txt }}
        run: |
          export PIP_INDEX_URL="$(cat "${PIP_URL_OUTPUT_FILE}")"
          pip install -r "${REQUIREMENTS_TXT}"
          pip install behave
          cd tests
          behave
  check-pre-commit:
    runs-on: ubuntu-latest
    if: inputs.run_pre_commit
    steps:
      - name: Checkout current
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
